<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Maria's Floral Fantasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-500: #e91e63;
            --primary-600: #d81b60;
            --primary-100: #fce4ec;
            --secondary-500: #9c27b0;
            --secondary-100: #f3e5f5;
            --success-500: #4caf50;
            --success-100: #e8f5e9;
            --warning-500: #ff9800;
            --warning-100: #fff3e0;
            --info-500: #2196f3;
            --info-100: #e3f2fd;
            --neutral-800: #1a1a1a;
            --neutral-700: #2d2d2d;
            --neutral-600: #666666;
            --neutral-500: #888888;
            --neutral-400: #aaaaaa;
            --neutral-300: #dddddd;
            --neutral-200: #eeeeee;
            --neutral-100: #f5f5f5;
            --neutral-50: #fafafa;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 24px;
            --space-6: 32px;
            --space-8: 48px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--neutral-50);
            color: var(--neutral-800);
        }

        /* Navigation (same as account.html) */
        .navbar {
            background: white;
            border-bottom: 1px solid var(--neutral-200);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--primary-600);
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--neutral-600);
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-600);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-btn {
            position: relative;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--neutral-600);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--primary-500);
            color: white;
            font-size: 11px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-menu { position: relative; }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .user-avatar:hover {
            border-color: var(--primary-200);
            transform: scale(1.05);
        }

        .dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            border: 1px solid var(--neutral-200);
        }

        .dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .dropdown-header .name {
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 4px;
        }

        .dropdown-header .email {
            font-size: 13px;
            color: var(--neutral-500);
        }

        .dropdown-menu {
            list-style: none;
            padding: 8px;
        }

        .dropdown-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--neutral-700);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.2s;
        }

        .dropdown-menu li a:hover, .dropdown-menu li a.active {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .dropdown-menu li a i {
            width: 20px;
            text-align: center;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--neutral-200);
            margin: 8px;
        }

        .logout-btn {
            color: #ef4444 !important;
        }

        .logout-btn:hover {
            background: #fef2f2 !important;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--neutral-900);
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--neutral-600);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
        }

        @media (max-width: 968px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            height: fit-content;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--neutral-200);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 4px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--neutral-600);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .sidebar-menu a.active {
            background: var(--primary-100);
            font-weight: 600;
        }

        .sidebar-menu i {
            width: 24px;
            text-align: center;
        }

        /* Orders List */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--neutral-200);
            overflow: hidden;
            transition: all 0.2s;
        }

        .order-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary-200);
        }

        .order-header {
            padding: 20px;
            background: var(--neutral-50);
            border-bottom: 1px solid var(--neutral-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-id {
            font-weight: 600;
            color: var(--neutral-900);
        }

        .order-date {
            font-size: 14px;
            color: var(--neutral-600);
        }

        .order-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-delivered {
            background: #d1fae5;
            color: #065f46;
        }

        .status-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-shipped {
            background: #fef3c7;
            color: #92400e;
        }

        .status-pending {
            background: #fce7f3;
            color: var(--primary-700);
        }

        .order-body {
            padding: 20px;
        }

        .order-items {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .order-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .item-image {
            width: 60px;
            height: 60px;
            background: var(--neutral-100);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .item-details h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--neutral-900);
            margin-bottom: 4px;
        }

        .item-details p {
            font-size: 13px;
            color: var(--neutral-600);
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--neutral-200);
        }

        .order-total {
            font-size: 18px;
            font-weight: 700;
            color: var(--neutral-900);
        }

        .order-total span {
            color: var(--neutral-600);
            font-size: 14px;
            font-weight: 500;
        }

        .order-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-600);
        }

        .btn-outline {
            background: white;
            color: var(--neutral-700);
            border: 1px solid var(--neutral-300);
        }

        .btn-outline:hover {
            border-color: var(--primary-500);
            color: var(--primary-600);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--neutral-500);
        }

        .empty-state-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 24px;
            background: var(--neutral-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--neutral-400);
        }

        .empty-state h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 8px;
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 8px;
            margin-bottom: 24px;
        }

        .mobile-menu a {
            white-space: nowrap;
            padding: 10px 20px;
            background: white;
            border-radius: var(--radius-full);
            text-decoration: none;
            color: var(--neutral-600);
            font-weight: 500;
            font-size: 14px;
            border: 1px solid var(--neutral-200);
        }

        .mobile-menu a.active {
            background: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
        }

        @media (max-width: 968px) {
            .mobile-menu {
                display: flex;
            }
            .sidebar {
                display: none;
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: white;
            padding: 16px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            border-left: 4px solid var(--success-500);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-spa"></i>
                <span>Maria's Floral</span>
            </a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            
            <div class="nav-actions">
                <button class="icon-btn" onclick="location.href='cart.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="badge" id="cartCount">0</span>
                </button>
                <button class="icon-btn">
                    <i class="fas fa-heart"></i>
                </button>
                <div class="user-menu">
                    <div class="user-avatar" onclick="toggleDropdown()"></div>
                    <div class="dropdown" id="userDropdown">
                        <div class="dropdown-header">
                            <div class="name" id="userName"></div>
                            <div class="email" id="userEmail"></div>
                        </div>
                        <ul class="dropdown-menu">
                            <li><a href="account.html"><i class="fas fa-user"></i> My Account</a></li>
                            <li><a href="orders.html" class="active"><i class="fas fa-box"></i> My Orders</a></li>
                            <div class="dropdown-divider"></div>
                            <li><a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu container">
        <a href="account.html">Profile</a>
        <a href="orders.html" class="active">Orders</a>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1>My Orders</h1>
            <p>Track and manage your purchases</p>
        </div>

        <div class="dashboard-grid">
            <!-- Sidebar -->
            <aside class="sidebar">
                <ul class="sidebar-menu">
                    <li><a href="account.html"><i class="fas fa-user"></i> Profile</a></li>
                    <li><a href="orders.html" class="active"><i class="fas fa-shopping-bag"></i> My Orders</a></li>
                    <div style="height: 1px; background: var(--neutral-200); margin: 16px 0;"></div>
                    <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </aside>

            <!-- Orders List -->
            <main class="main-content">
                <div id="ordersContainer">
                    <!-- Orders rendered by JavaScript -->
                </div>
            </main>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle" style="color: var(--success-500);"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            
            if (!user.loggedIn || user.role !== 'user') {
                window.location.href = 'login.html';
                return;
            }
            
            // Update user info
            document.getElementById('userName').textContent = user.name || '';
            document.getElementById('userEmail').textContent = user.email || '';
            document.querySelector('.user-avatar').textContent = (user.name || '').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            
            // Load orders
            loadOrders();
        });

        // Sample orders data (in real app, this would come from backend)
        const sampleOrders = [
            {
                id: 'ORD-2024-001',
                date: '2024-02-20',
                status: 'delivered',
                items: [
                    { name: 'Rose Bouquet Deluxe', qty: 1, price: 1250, emoji: '🌹' },
                    { name: 'Sunflower Box', qty: 1, price: 850, emoji: '🌻' }
                ],
                total: 2100
            },
            {
                id: 'ORD-2024-002',
                date: '2024-02-15',
                status: 'shipped',
                items: [
                    { name: 'Orchid Elegance', qty: 2, price: 1800, emoji: '🌺' }
                ],
                total: 3600,
                tracking: 'J&T-123456789'
            },
            {
                id: 'ORD-2024-003',
                date: '2024-02-10',
                status: 'processing',
                items: [
                    { name: 'Wedding Centerpiece', qty: 1, price: 8500, emoji: '💐' }
                ],
                total: 8500
            }
        ];

        function loadOrders() {
            // In real app, fetch from API
            // For demo, use sample data or localStorage
            const savedOrders = localStorage.getItem('mff_customer_orders');
            const orders = savedOrders ? JSON.parse(savedOrders) : sampleOrders;
            
            renderOrders(orders);
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <h3>No orders yet</h3>
                        <p>Start shopping to see your orders here</p>
                        <a href="shop.html" class="btn btn-primary" style="margin-top: 16px;">
                            <i class="fas fa-store"></i> Start Shopping
                        </a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Order #${order.id}</div>
                            <div class="order-date">${formatDate(order.date)}</div>
                        </div>
                        <span class="order-status status-${order.status}">
                            <i class="fas fa-${getStatusIcon(order.status)}"></i>
                            ${order.status}
                        </span>
                    </div>
                    <div class="order-body">
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <div class="item-image">${item.emoji}</div>
                                    <div class="item-details">
                                        <h4>${item.name}</h4>
                                        <p>Qty: ${item.qty} × ₱${item.price.toLocaleString()}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="order-footer">
                            <div class="order-total">
                                <span>Total:</span> ₱${order.total.toLocaleString()}
                            </div>
                            <div class="order-actions">
                                ${order.tracking ? `
                                <button class="btn btn-outline" onclick="trackOrder('${order.tracking}')">
                                    <i class="fas fa-truck"></i> Track
                                </button>
                                ` : ''}
                                <button class="btn btn-outline" onclick="viewDetails('${order.id}')">
                                    <i class="fas fa-eye"></i> Details
                                </button>
                                ${order.status === 'delivered' ? `
                                <button class="btn btn-primary" onclick="reorder('${order.id}')">
                                    <i class="fas fa-redo"></i> Reorder
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function getStatusIcon(status) {
            const icons = {
                pending: 'clock',
                processing: 'cog',
                shipped: 'truck',
                delivered: 'check-circle',
                cancelled: 'times-circle'
            };
            return icons[status] || 'question-circle';
        }

        function trackOrder(tracking) {
            showToast(`Tracking: ${tracking}`);
        }

        function viewDetails(orderId) {
            showToast(`Viewing details for ${orderId}`);
        }

        function reorder(orderId) {
            showToast('Items added to cart!');
        }

        // Toggle dropdown
        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('show');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-menu')) {
                document.getElementById('userDropdown').classList.remove('show');
            }
        });

        // Show toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Logout
        function logout() {
            localStorage.removeItem('currentUser');
            showToast('Logged out successfully');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        }
    </script>
    <script>
    // Apply saved theme color on every page
    (function() {
        try {
            const savedColor = localStorage.getItem('themeColor');
            if (savedColor && savedColor.startsWith('#') && savedColor.length === 7) {
                document.documentElement.style.setProperty('--primary-500', savedColor);
            }
        } catch (err) {
            // Silent fail – don't break the page
            console.warn('Theme color could not be applied', err);
        }
    })();
</script>
</body>
</html>
