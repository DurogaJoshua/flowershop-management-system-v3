<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maria's Floral Fantasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-50: #fdf2f8;
            --primary-100: #fce7f3;
            --primary-200: #fbcfe8;
            --primary-500: #ec4899;
            --primary-600: #db2777;
            --primary-700: #be185d;
            --neutral-50: #fafafa;
            --neutral-100: #f5f5f5;
            --neutral-200: #e5e5e5;
            --neutral-300: #d4d4d4;
            --neutral-400: #a3a3a3;
            --neutral-500: #737373;
            --neutral-600: #525252;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-7: 28px;
            --space-8: 32px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --transition-fast: 0.18s ease;
            --transition-medium: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-50) 0%, #fff 50%, #f3e8ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-5);
        }

        .login-wrapper { width:100%; max-width:480px; }

        .login-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border: 1px solid var(--neutral-200);
            position: relative;
            overflow: hidden;
            min-height: 540px;
            display: flex;
            flex-direction: column;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: var(--primary-500);
        }

        .card-header { text-align: center; margin-bottom: var(--space-7); min-height: 120px; }

        .logo-circle {
            width: 80px; height: 80px;
            border-radius: var(--radius-full);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto var(--space-4);
            font-size: 32px;
            background: var(--primary-100);
            color: var(--primary-600);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px; font-weight: 700;
            color: var(--neutral-800);
            margin-bottom: var(--space-2);
        }

        .subtitle { color: var(--neutral-500); font-size: 14px; min-height: 20px; }

        .form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group { margin-bottom: var(--space-5); }

        .form-label {
            display: block;
            font-size: 14px; font-weight: 500;
            color: var(--neutral-700);
            margin-bottom: var(--space-2);
        }

        .input-wrapper { position: relative; }

        .form-input {
            width: 100%;
            padding: 15px 16px 15px 48px;
            border: 2px solid var(--neutral-200);
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all var(--transition-fast);
            background: var(--neutral-50);
        }

        .form-input:focus {
            outline: none;
            background: white;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 4px var(--primary-100);
        }

        .input-icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-400); font-size: 18px;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon { color: var(--primary-500); }

        .toggle-password {
            position: absolute; right: 16px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--neutral-400); cursor: pointer;
            padding: 4px; font-size: 17px;
        }

        .form-options {
            display: flex; justify-content: space-between; align-items: center;
            margin: var(--space-5) 0 var(--space-6);
            font-size: 14px;
        }

        .btn {
            width: 100%; padding: 16px;
            border: none; border-radius: var(--radius-md);
            font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.28s ease;
            display: flex; align-items: center; justify-content: center;
            gap: var(--space-2); text-transform: uppercase;
            letter-spacing: 0.4px; min-height: 56px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
            box-shadow: 0 4px 10px rgba(236,72,153,0.25);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(236,72,153,0.35);
        }

        .link-text {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-align: center;
            display: block;
            margin-top: var(--space-5);
        }

        .link-text:hover { color: var(--primary-700); text-decoration: underline; }

        .security-hint {
            text-align: center; font-size: 13px;
            color: var(--neutral-500); margin-top: auto;
            padding: var(--space-4);
            background: var(--neutral-50);
            border-radius: var(--radius-md);
            border: 1px dashed var(--neutral-300);
            margin-top: var(--space-6);
        }

        .back-home {
            text-align: center;
            margin-top: var(--space-5);
            color: var(--neutral-500);
            text-decoration: none;
            font-size: 14px;
        }

        .back-home:hover { color: var(--neutral-800); }

        .toast {
            position: fixed; top: 24px; right: 24px;
            padding: 16px 24px;
            background: white; border-radius: var(--radius-md);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.12);
            display: flex; align-items: center; gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000; border-left: 5px solid;
        }

        .toast.show { transform: translateX(0); }

        .toast.success { border-left-color: #10b981; }
        .toast.error   { border-left-color: #ef4444;  }
        .toast.info    { border-left-color: #3b82f6;  }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-8px); }
            40%,80% { transform: translateX(8px); }
        }

        .shake { animation: shake 0.6s ease-in-out; }

        @media (max-width: 480px) {
            .login-card { padding: var(--space-6); min-height: 520px; }
            h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card" id="loginCard">

            <div class="card-header">
                <div class="logo-circle" id="logoIcon">
                    <i class="fas fa-spa"></i>
                </div>
                <h2 id="welcomeText">Welcome Back</h2>
                <p class="subtitle" id="subtitleText">Sign in to your account</p>
            </div>

            <div class="form-container" id="formContainer">

                <!-- LOGIN FORM -->
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="form-input" placeholder="you@example.com" required id="emailInput">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" placeholder="••••••••" required id="passwordInput">
                            <button type="button" class="toggle-password" onclick="togglePassword('passwordInput', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span>Sign In</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div class="link-text" onclick="switchToRegister()">Don't have an account? Create one</div>
                </form>

                <!-- REGISTER FORM -->
                <form id="registerForm" onsubmit="return handleRegister(event)" style="display:none;">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" placeholder="Maria Santos" required id="nameInput">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" class="form-input" placeholder="you@example.com" required id="regEmailInput">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" placeholder="••••••••" required id="regPasswordInput">
                            <button type="button" class="toggle-password" onclick="togglePassword('regPasswordInput', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" placeholder="••••••••" required id="regConfirmInput">
                            <button type="button" class="toggle-password" onclick="togglePassword('regConfirmInput', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="registerBtn">
                        <span>Create Account</span>
                        <i class="fas fa-user-plus"></i>
                    </button>

                    <div class="link-text" onclick="switchToLogin()">Already have an account? Sign in</div>
                </form>

            </div>

            <div class="security-hint" id="securityHint">
                <i class="fas fa-info-circle"></i>
                New here? Create an account to start shopping
            </div>

            <a href="index.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Back to home
            </a>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script>
        let isRegisterMode = false;

        function switchToRegister() {
            isRegisterMode = true;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';

            document.getElementById('welcomeText').textContent = 'Join Us';
            document.getElementById('subtitleText').textContent = 'Create your customer account';
            document.getElementById('securityHint').innerHTML = '<i class="fas fa-info-circle"></i> New here? Create an account to start shopping';
        }

        function switchToLogin() {
            isRegisterMode = false;
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';

            document.getElementById('welcomeText').textContent = 'Welcome Back';
            document.getElementById('subtitleText').textContent = 'Sign in to your account';
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toast.className = `toast ${type}`;
            msgEl.textContent = message;

            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
                icon.style.color = '#10b981';
            } else if (type === 'error') {
                icon.className = 'fas fa-times-circle';
                icon.style.color = '#ef4444';
            } else {
                icon.className = 'fas fa-info-circle';
                icon.style.color = '#3b82f6';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3200);
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const submitBtn = document.getElementById('submitBtn');

            // Basic format check only (browser already enforces type="email")
            if (!email.includes('@') || !email.includes('.')) {
                showToast('Please enter a valid email address', 'error');
                return false;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return false;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            setTimeout(() => {
                const userData = {
                    email,
                    name: email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
                    role: 'user',
                    loggedIn: true,
                    loginTime: new Date().toISOString()
                };

                localStorage.setItem('currentUser', JSON.stringify(userData));
                showToast(`Welcome back!`, 'success');

                setTimeout(() => {
                    const returnUrl = new URLSearchParams(window.location.search).get('return') || 'index.html';
                    window.location.href = returnUrl;
                }, 800);
            }, 1400);

            return false;
        }

        function handleRegister(e) {
            e.preventDefault();

            const name     = document.getElementById('nameInput').value.trim();
            const email    = document.getElementById('regEmailInput').value.trim();
            const password = document.getElementById('regPasswordInput').value;
            const confirm  = document.getElementById('regConfirmInput').value;
            const btn      = document.getElementById('registerBtn');

            if (!name || name.length < 2) {
                showToast('Please enter your full name', 'error');
                return false;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showToast('Please enter a valid email address', 'error');
                return false;
            }

            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return false;
            }

            if (password !== confirm) {
                showToast('Passwords do not match', 'error');
                return false;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            setTimeout(() => {
                const userData = {
                    email,
                    name,
                    role: 'user',
                    loggedIn: true,
                    loginTime: new Date().toISOString(),
                    createdAt: new Date().toISOString()
                };

                localStorage.setItem('currentUser', JSON.stringify(userData));
                showToast(`Account created successfully!`, 'success');

                setTimeout(() => {
                    const returnUrl = new URLSearchParams(window.location.search).get('return') || 'index.html';
                    window.location.href = returnUrl;
                }, 1200);
            }, 1500);

            return false;
        }

        function handleForgotPassword(e) {
            e.preventDefault();
            showToast('Password reset link sent to your email', 'info');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (user.loggedIn) {
                const hours = (Date.now() - new Date(user.loginTime).getTime()) / (1000 * 60 * 60);
                if (hours >= 24) {
                    localStorage.removeItem('currentUser');
                }
            }
        });
    </script>
</body>
</html>
