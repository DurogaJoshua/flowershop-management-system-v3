<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Maria's Floral Fantasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-500: #e91e63;
            --primary-600: #d81b60;
            --primary-100: #fce4ec;
            --secondary-500: #9c27b0;
            --secondary-100: #f3e5f5;
            --success-500: #4caf50;
            --success-100: #e8f5e9;
            --warning-500: #ff9800;
            --warning-100: #fff3e0;
            --info-500: #2196f3;
            --info-100: #e3f2fd;
            --neutral-800: #1a1a1a;
            --neutral-700: #2d2d2d;
            --neutral-600: #666666;
            --neutral-500: #888888;
            --neutral-400: #aaaaaa;
            --neutral-300: #dddddd;
            --neutral-200: #eeeeee;
            --neutral-100: #f5f5f5;
            --neutral-50: #fafafa;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 24px;
            --space-6: 32px;
            --space-8: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--neutral-50);
            color: var(--neutral-800);
        }

        /* Navigation */
        .navbar {
            background: white;
            border-bottom: 1px solid var(--neutral-200);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--primary-600);
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--neutral-600);
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-600);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-btn {
            position: relative;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--neutral-600);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--primary-500);
            color: white;
            font-size: 11px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-menu { position: relative; }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .user-avatar:hover {
            border-color: var(--primary-200);
            transform: scale(1.05);
        }

        .dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            border: 1px solid var(--neutral-200);
        }

        .dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: 16px;
            border-bottom: 1px solid var(--neutral-100);
        }

        .dropdown-header .name {
            font-weight: 600;
            color: var(--neutral-800);
            margin-bottom: 4px;
        }

        .dropdown-header .email {
            font-size: 13px;
            color: var(--neutral-500);
        }

        .dropdown-menu {
            list-style: none;
            padding: 8px;
        }

        .dropdown-menu li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--neutral-700);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.2s;
        }

        .dropdown-menu li a:hover, .dropdown-menu li a.active {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .dropdown-menu li a.active {
            background: var(--primary-100);
            font-weight: 600;
        }

        .dropdown-menu li a i {
            width: 20px;
            text-align: center;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--neutral-200);
            margin: 8px;
        }

        .logout-btn {
            color: #ef4444 !important;
        }

        .logout-btn:hover {
            background: #fef2f2 !important;
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--neutral-900);
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--neutral-600);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
        }

        @media (max-width: 968px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            height: fit-content;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--neutral-200);
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 4px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--neutral-600);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: var(--primary-50);
            color: var(--primary-600);
        }

        .sidebar-menu a.active {
            background: var(--primary-100);
            font-weight: 600;
        }

        .sidebar-menu i {
            width: 24px;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--neutral-200);
            overflow: hidden;
        }

        .card-header {
            padding: 24px;
            border-bottom: 1px solid var(--neutral-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--neutral-900);
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--neutral-700);
            border: 1px solid var(--neutral-300);
        }

        .btn-outline:hover {
            border-color: var(--primary-500);
            color: var(--primary-600);
            background: var(--primary-50);
        }

        .card-body {
            padding: 24px;
        }

        /* Profile Form */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--neutral-700);
        }

        .form-input {
            padding: 12px 16px;
            border: 1px solid var(--neutral-300);
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-100);
        }

        .form-input:disabled {
            background: var(--neutral-100);
            color: var(--neutral-500);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--neutral-200);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-card.orders .stat-icon {
            background: #dbeafe;
            color: #2563eb;
        }

        .stat-card.points .stat-icon {
            background: #fef3c7;
            color: #d97706;
        }

        .stat-card.wishlist .stat-icon {
            background: #fce7f3;
            color: var(--primary-600);
        }

        .stat-card.savings .stat-icon {
            background: #d1fae5;
            color: #059669;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--neutral-900);
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--neutral-500);
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: white;
            padding: 16px 24px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            border-left: 4px solid var(--success-500);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 8px;
            margin-bottom: 24px;
        }

        .mobile-menu a {
            white-space: nowrap;
            padding: 10px 20px;
            background: white;
            border-radius: var(--radius-full);
            text-decoration: none;
            color: var(--neutral-600);
            font-weight: 500;
            font-size: 14px;
            border: 1px solid var(--neutral-200);
        }

        .mobile-menu a.active {
            background: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
        }

        @media (max-width: 968px) {
            .mobile-menu {
                display: flex;
            }
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-spa"></i>
                <span>Maria's Floral</span>
            </a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                 <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            
            <div class="nav-actions">
                <button class="icon-btn" onclick="location.href='cart.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="badge" id="cartCount">2</span>
                </button>
                <button class="icon-btn">
                    <i class="fas fa-heart"></i>
                </button>
                <div class="user-menu">
                    <div class="user-avatar" onclick="toggleDropdown()"></div>
                    <div class="dropdown" id="userDropdown">
                        <div class="dropdown-header">
                            <div class="name" id="userName"></div>
                            <div class="email" id="userEmail"></div>
                        </div>
                        <ul class="dropdown-menu">
                            <li><a href="account.html" class="active"><i class="fas fa-user"></i> My Account</a></li>
                            <li><a href="orders.html"><i class="fas fa-box"></i> My Orders</a></li>
                            <div class="dropdown-divider"></div>
                            <li><a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu container">
        <a href="account.html" class="active">Profile</a>
        <a href="orders.html">Orders</a>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1>My Account</h1>
            <p>Manage your profile, orders, and preferences</p>
        </div>

        <div class="dashboard-grid">
            <!-- Sidebar -->
            <aside class="sidebar">
                <ul class="sidebar-menu">
                    <li><a href="account.html" class="active"><i class="fas fa-user"></i> Profile</a></li>
                    <li><a href="orders.html"><i class="fas fa-shopping-bag"></i> My Orders</a></li>
                    <div style="height: 1px; background: var(--neutral-200); margin: 16px 0;"></div>
                    <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                
                <!-- Stats Overview -->
                <div class="stats-grid">
                    <div class="stat-card orders">
                        <div class="stat-icon"><i class="fas fa-box"></i></div>
                        <div class="stat-value" id="totalOrders">12</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                    <div class="stat-card points">
                        <div class="stat-icon"><i class="fas fa-gift"></i></div>
                        <div class="stat-value">0</div>
                        <div class="stat-label">Reward Points</div>
                    </div>
                    <div class="stat-card savings">
                        <div class="stat-icon"><i class="fas fa-piggy-bank"></i></div>
                        <div class="stat-value">0</div>
                        <div class="stat-label">Total Savings</div>
                    </div>
                </div>

                <!-- Profile Information -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Personal Information</h3>
                        <button class="btn btn-outline" onclick="toggleEdit()">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                    </div>
                    <div class="card-body">
                        <form id="profileForm" onsubmit="return saveProfile(event)">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-input" id="firstName" value="Maria" disabled>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-input" id="lastName" value="Santos" disabled>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-input" id="email" value="maria@example.com" disabled>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-input" id="phone" value="09123456789" disabled>
                                </div>
                                <div class="form-group full-width">
                                    <label class="form-label">Delivery Address</label>
                                    <input type="text" class="form-input" id="address" value="123 Flower Street, Makati City, Metro Manila" disabled>
                                </div>
                            </div>
                            <div style="margin-top: 24px; display: none;" id="saveBtnContainer">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Save Changes
                                </button>
                                <button type="button" class="btn btn-outline" onclick="toggleEdit()" style="margin-left: 12px;">
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Password Change -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Security</h3>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-outline" onclick="showToast('Password change coming soon')">
                            <i class="fas fa-lock"></i> Change Password
                        </button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-check-circle" style="color: var(--success-500);"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            
            if (!user.loggedIn || user.role !== 'user') {
                window.location.href = 'login.html';
                return;
            }
            
            // Update user info
            document.getElementById('userName').textContent = user.name || '';
            document.getElementById('userEmail').textContent = user.email || '';
            document.querySelector('.user-avatar').textContent = (user.name || '').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            
            // Load stats
            loadStats();
        });

        function loadStats() {
            // Get orders count
            const orders = JSON.parse(localStorage.getItem('mff_orders') || '[]');
            document.getElementById('totalOrders').textContent = orders.length;
            
            // Get wishlist count
            const wishlist = JSON.parse(localStorage.getItem('mff_wishlist') || '[]');
            document.getElementById('wishlistCount').textContent = wishlist.length;
        }

        // Toggle dropdown
        function toggleDropdown() {
            document.getElementById('userDropdown').classList.toggle('show');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-menu')) {
                document.getElementById('userDropdown').classList.remove('show');
            }
        });

        // Toggle edit mode
        let isEditing = false;
        function toggleEdit() {
            isEditing = !isEditing;
            const inputs = document.querySelectorAll('#profileForm .form-input');
            const saveBtn = document.getElementById('saveBtnContainer');
            
            inputs.forEach(input => {
                input.disabled = !isEditing;
            });
            
            saveBtn.style.display = isEditing ? 'block' : 'none';
        }

        // Save profile
        function saveProfile(e) {
            e.preventDefault();
            
            // Simulate saving
            showToast('Profile updated successfully!');
            toggleEdit();
            return false;
        }

        // Show toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toast.classList.add('error');
                icon.className = 'fas fa-times-circle';
                icon.style.color = '#ef4444';
            } else {
                toast.classList.remove('error');
                icon.className = 'fas fa-check-circle';
                icon.style.color = 'var(--success-500)';
            }
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Logout
        function logout() {
            localStorage.removeItem('currentUser');
            showToast('Logged out successfully');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        }
    </script>
    <script>
    // Apply saved theme color on every page
    (function() {
        try {
            const savedColor = localStorage.getItem('themeColor');
            if (savedColor && savedColor.startsWith('#') && savedColor.length === 7) {
                document.documentElement.style.setProperty('--primary-500', savedColor);
            }
        } catch (err) {
            // Silent fail – don't break the page
            console.warn('Theme color could not be applied', err);
        }
    })();
</script>
<script>
    // Apply saved theme color on every page
    (function() {
        try {
            const savedColor = localStorage.getItem('themeColor');
            if (savedColor && savedColor.startsWith('#') && savedColor.length === 7) {
                document.documentElement.style.setProperty('--primary-500', savedColor);
            }
        } catch (err) {
            // Silent fail – don't break the page
            console.warn('Theme color could not be applied', err);

</script>
</body>
</html>
