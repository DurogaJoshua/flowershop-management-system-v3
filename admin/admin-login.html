<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Maria's Floral Fantasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-50: #0a0508;
            --primary-100: #bd7da1;
            --primary-200: #fbcfe8;
            --primary-500: #9a35e8;
            --primary-600: #9226f0;
            --primary-700: #5218be;
            --neutral-50: #fafafa;
            --neutral-100: #641919;
            --neutral-200: #e5e5e5;
            --neutral-300: #d4d4d4;
            --neutral-400: #a3a3a3;
            --neutral-500: #ccb1b1;
            --neutral-600: #525252;
            --neutral-700: #404040;
            --neutral-800: #262626;
            --neutral-900: #171717;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-7: 28px;
            --space-8: 32px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --transition-fast: 0.18s ease;
            --transition-medium: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--primary-50) 0%, #fff 50%, #f3e8ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-5);
        }

        .login-wrapper { width:100%; max-width:480px; }

        .login-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--space-8);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            border: 1px solid var(--neutral-200);
            position: relative;
            overflow: hidden;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: var(--primary-700);
        }

        .card-header { text-align: center; margin-bottom: var(--space-7); min-height: 100px; }

        .logo-circle {
            width: 80px; height: 80px;
            border-radius: var(--radius-full);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto var(--space-4);
            font-size: 32px;
            background: var(--primary-200);
            color: var(--primary-700);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px; font-weight: 700;
            color: var(--neutral-800);
            margin-bottom: var(--space-2);
        }

        .subtitle { color: var(--neutral-600); font-size: 14px; font-weight: 500; }

        .form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group { margin-bottom: var(--space-5); }

        .form-label {
            display: block;
            font-size: 14px; font-weight: 500;
            color: var(--neutral-700);
            margin-bottom: var(--space-2);
        }

        .input-wrapper { position: relative; }

        .form-input {
            width: 100%;
            padding: 15px 16px 15px 48px;
            border: 2px solid var(--neutral-200);
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all var(--transition-fast);
            background: var(--neutral-50);
        }

        .form-input:focus {
            outline: none;
            background: white;
            border-color: var(--primary-600);
            box-shadow: 0 0 0 4px rgba(190,24,93,0.15);
        }

        .input-icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--neutral-400); font-size: 18px;
            transition: color 0.3s ease;
        }

        .form-input:focus + .input-icon { color: var(--primary-600); }

        .btn {
            width: 100%; padding: 16px;
            border: none; border-radius: var(--radius-md);
            font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.28s ease;
            display: flex; align-items: center; justify-content: center;
            gap: var(--space-2); text-transform: uppercase;
            letter-spacing: 0.4px; min-height: 56px;
        }

        .btn-admin {
            background: linear-gradient(135deg, var(--primary-700), #9d174d);
            color: white;
            box-shadow: 0 4px 10px rgba(190,24,93,0.3);
        }

        .btn-admin:hover {
            background: linear-gradient(135deg, #9d174d, #831843);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(190,24,93,0.4);
        }

        .security-hint {
            text-align: center; font-size: 13px;
            color: var(--neutral-500); margin-top: auto;
            padding: var(--space-4);
            background: var(--neutral-50);
            border-radius: var(--radius-md);
            border: 1px dashed var(--neutral-300);
            margin-top: var(--space-6);
        }

        .back-home {
            text-align: center;
            margin-top: var(--space-5);
            color: var(--neutral-500);
            text-decoration: none;
            font-size: 14px;
        }

        .back-home:hover { color: var(--neutral-800); }

        .toast {
            position: fixed; top: 24px; right: 24px;
            padding: 16px 24px;
            background: white; border-radius: var(--radius-md);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.12);
            display: flex; align-items: center; gap: 12px;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000; border-left: 5px solid;
        }

        .toast.show { transform: translateX(0); }

        .toast.success { border-left-color: #10b981; }
        .toast.error   { border-left-color: #ef4444;  }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60% { transform: translateX(-8px); }
            40%,80% { transform: translateX(8px); }
        }

        .shake { animation: shake 0.6s ease-in-out; }

        @media (max-width: 480px) {
            .login-card { padding: var(--space-6); min-height: 500px; }
            h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card" id="loginCard">

            <div class="card-header">
                <div class="logo-circle">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2>Admin Access</h2>
                <p class="subtitle">Staff & backend only</p>
            </div>

            <div class="form-container">

                <form id="adminLoginForm" onsubmit="return handleAdminLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email / Staff ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user-shield input-icon"></i>
                            <input type="text" class="form-input" placeholder="admin@mariafloral.ph" required id="adminIdentifier">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-input" placeholder="••••••••" required id="adminPassword">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Admin Code</label>
                        <div class="input-wrapper">
                            <i class="fas fa-key input-icon"></i>
                            <input type="text" class="form-input" placeholder="Enter staff access code" required id="adminCode">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-admin" id="adminSubmitBtn">
                        <span>Enter Admin Panel</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

            </div>

            <div class="security-hint">
                <i class="fas fa-lock"></i> Restricted area — unauthorized access is prohibited
            </div>

            <a href="index.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Back to website
            </a>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script>
        const SECRET_ADMIN_CODE = "floral2025"; // ← Change this in production!

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');

            toast.className = `toast ${type}`;
            msgEl.textContent = message;

            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
            } else {
                icon.className = 'fas fa-times-circle';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3200);
        }

        function handleAdminLogin(e) {
            e.preventDefault();

            const identifier = document.getElementById('adminIdentifier').value.trim();
            const password   = document.getElementById('adminPassword').value;
            const code       = document.getElementById('adminCode').value.trim();
            const btn        = document.getElementById('adminSubmitBtn');

            if (!identifier) {
                showToast('Please enter your staff email or ID', 'error');
                return false;
            }

            if (password.length < 6) {
                showToast('Password is too short', 'error');
                return false;
            }

            if (code !== SECRET_ADMIN_CODE) {
                showToast('Invalid admin code', 'error');
                document.getElementById('adminCode').classList.add('shake');
                setTimeout(() => document.getElementById('adminCode').classList.remove('shake'), 600);
                return false;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            setTimeout(() => {
                const adminData = {
                    identifier,
                    role: 'admin',
                    loggedIn: true,
                    loginTime: new Date().toISOString(),
                    accessLevel: 'full'
                };

                localStorage.setItem('currentUser', JSON.stringify(adminData));
                showToast('Admin access granted', 'success');

                setTimeout(() => {
                    window.location.href = 'settings.html';
                }, 900);
            }, 1400);

            return false;
        }
    </script>
</body>
</html>
